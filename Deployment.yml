
apiVersion: apps/v1
kind: StatefulSet # Type of kubernetes resource, which is StatefulSet
metadata:
  name: kubernetes
spec: # Describes the desired state of the deployment
  serviceName: bully-service
  replicas: 5 # How many pods to run
  selector:
    matchLabels:
      app: kubernetes
  template:
    metadata:
      labels:
        app: kubernetes
    spec:
      containers:
        - name: kubernetes
          image: 202106601/kubernetes
          imagePullPolicy: Never
          env:
            - name: Web_Port
              value: "8000"
            - name: Pod_Ip
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: Pod_Id
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SERVICE_DNS
              value: "bully-service"
              
          startupProbe: 
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          
          readinessProbe: 
            httpGet: 
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

  